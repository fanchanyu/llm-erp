version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: llm_erp_db
    environment:
      POSTGRES_DB: llm_erp
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_pass_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d llm_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
