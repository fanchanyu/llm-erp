<svg viewBox="0 0 880 340" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono',monospace"><defs>
      <linearGradient id="passGrad" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#34d399" stop-opacity="0.85"/>
      </linearGradient>
      <linearGradient id="failGrad" x1="0" y1="1" x2="0" y2="0">
        <stop offset="0%" stop-color="#1e293b" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#1e293b" stop-opacity="1"/>
      </linearGradient>
      <filter id="glowPass">
        <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#34d399" flood-opacity="0.3"/>
      </filter>
    </defs>
    <!-- Gridlines -->
    <line x1="8" y1="292" x2="840" y2="292" stroke="#1e293b" stroke-width="1"/><text x="-2" y="296" text-anchor="end" fill="#475569" font-size="11">0%</text>
    <line x1="8" y1="225" x2="840" y2="225" stroke="#1e293b" stroke-width="1"/><text x="-2" y="229" text-anchor="end" fill="#475569" font-size="11">25%</text>
    <line x1="8" y1="158" x2="840" y2="158" stroke="#1e293b" stroke-width="1"/><text x="-2" y="162" text-anchor="end" fill="#475569" font-size="11">50%</text>
    <line x1="8" y1="91" x2="840" y2="91" stroke="#1e293b" stroke-width="1"/><text x="-2" y="95" text-anchor="end" fill="#475569" font-size="11">75%</text>
    <line x1="8" y1="24" x2="840" y2="24" stroke="#1e293b" stroke-width="1"/><text x="-2" y="28" text-anchor="end" fill="#475569" font-size="11">100%</text>
    <!-- Inventory: 4/5 -->
    <rect x="43.4" y="24" width="48" height="53.6" fill="url(#failGrad)" rx="3"/><rect x="43.4" y="77.6" width="48" height="214.4" fill="url(#passGrad)" rx="3" filter="url(#glowPass)"/><text x="67.4" y="310" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">4/5</text><text x="67.4" y="326" text-anchor="middle" fill="#94a3b8" font-size="10">Inventory</text>
    <!-- Purchase: 4/5 -->
    <rect x="162.3" y="24" width="48" height="53.6" fill="url(#failGrad)" rx="3"/><rect x="162.3" y="77.6" width="48" height="214.4" fill="url(#passGrad)" rx="3" filter="url(#glowPass)"/><text x="186.3" y="310" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">4/5</text><text x="186.3" y="326" text-anchor="middle" fill="#94a3b8" font-size="10">Purchase</text>
    <!-- BOM: 4/4 -->
    <rect x="281.1" y="24" width="48" height="268" fill="url(#passGrad)" rx="3" filter="url(#glowPass)"/><text x="305.1" y="310" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">4/4</text><text x="305.1" y="326" text-anchor="middle" fill="#94a3b8" font-size="10">BOM</text>
    <!-- Dispatch: 5/5 -->
    <rect x="400" y="24" width="48" height="268" fill="url(#passGrad)" rx="3" filter="url(#glowPass)"/><text x="424" y="310" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">5/5</text><text x="424" y="326" text-anchor="middle" fill="#94a3b8" font-size="10">Dispatch</text>
    <!-- Quality: 4/4 -->
    <rect x="518.9" y="24" width="48" height="268" fill="url(#passGrad)" rx="3" filter="url(#glowPass)"/><text x="542.9" y="310" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">4/4</text><text x="542.9" y="326" text-anchor="middle" fill="#94a3b8" font-size="10">Quality</text>
    <!-- Accounting: 5/5 -->
    <rect x="637.7" y="24" width="48" height="268" fill="url(#passGrad)" rx="3" filter="url(#glowPass)"/><text x="661.7" y="310" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">5/5</text><text x="661.7" y="326" text-anchor="middle" fill="#94a3b8" font-size="10">Accounting</text>
    <!-- Cross-module: 1/2 -->
    <rect x="756.6" y="24" width="48" height="134" fill="url(#failGrad)" rx="3"/><rect x="756.6" y="158" width="48" height="134" fill="url(#passGrad)" rx="3" filter="url(#glowPass)"/><text x="780.6" y="310" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">1/2</text><text x="780.6" y="326" text-anchor="middle" fill="#94a3b8" font-size="10">Cross-module</text>
</svg>
