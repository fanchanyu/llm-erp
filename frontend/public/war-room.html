<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM-ERP 戰情室 · 拓樸</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f4f8; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; color: #334155; }

.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(148,163,184,0.15) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,0.15) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

.header { position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  padding: 16px 40px; display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(180deg, #f0f4f8 0%, transparent 100%);
}
.header h1 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: #1e293b; }
.header h1 small { font-size: 11px; color: #94a3b8; font-weight: 400; }
.dot-live { width: 8px; height: 8px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,211,238,0.4); } 70% { opacity: 1; box-shadow: 0 0 0 14px rgba(34,211,238,0); } }
.header .meta { display: flex; gap: 20px; font-size: 11px; color: #64748b; }
.header .meta strong { color: #475569; }

.topology { position: fixed; inset: 75px 40px 100px; z-index: 1; }
svg { width: 100%; height: 100%; }

.topo-node { cursor: pointer; transition: all 0.3s; }
.topo-node:hover { filter: brightness(1.15); }
.topo-node.highlight { filter: drop-shadow(0 0 12px rgba(34,211,238,0.5)); }
.topo-node.dim { opacity: 0.3; }
.node-bg { transition: all 0.3s; }
.node-icon { font-size: 22px; }
.node-title { font-size: 14px; font-weight: 700; fill: #1e293b; }
.node-kpi { font-size: 20px; font-weight: 800; fill: #1e293b; }
.node-sublabel { font-size: 9px; fill: #64748b; }

/* Health status dot */
.health-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.health-dot.healthy { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.4); }
.health-dot.warning { background: #eab308; box-shadow: 0 0 6px rgba(234,179,8,0.4); }
.health-dot.critical { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.4); animation: pulseRed 1s infinite; }
@keyframes pulseRed { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

/* Edges */
.topo-edge { stroke-width: 2; fill: none; }
.topo-edge.material { stroke: #10b981; stroke-dasharray: none; }
.topo-edge.info { stroke: #3b82f6; stroke-dasharray: 6,4; }
.topo-edge.finance { stroke: #fbbf24; stroke-dasharray: 4,4; }
.topo-edge.quality { stroke: #f43f5e; stroke-dasharray: 3,3; }
.topo-edge-label { font-size: 8px; fill: #94a3b8; }

.edge-dot { animation: edgeFlow 3s linear infinite; }
.edge-dot.material-dot { fill: #34d399; }
.edge-dot.info-dot { fill: #60a5fa; }
.edge-dot.finance-dot { fill: #fbbf24; }
@keyframes edgeFlow { 0% { opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { opacity: 0; } }

.event-card {
  position: fixed; z-index: 20; pointer-events: none;
  padding: 4px 10px; border-radius: 6px; font-size: 9px; font-weight: 600;
  white-space: nowrap; opacity: 0; transition: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.event-card.mat { background: rgba(16,185,129,0.95); color: #fff; }
.event-card.pur { background: rgba(59,130,246,0.95); color: #fff; }
.event-card.prod { background: rgba(239,68,68,0.95); color: #fff; }
.event-card.qual { background: rgba(244,63,94,0.95); color: #fff; }
.event-card.fin { background: rgba(251,191,36,0.95); color: #1e293b; }

.event-stream {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
  height: 92px;
  background: linear-gradient(0deg, rgba(240,244,248,0.97) 0%, rgba(240,244,248,0.7) 100%);
  padding: 10px 40px; overflow: hidden;
  border-top: 1px solid #e2e8f0;
}
.event-stream .label { font-size: 9px; color: #94a3b8; margin-bottom: 6px; letter-spacing: 1px; }
.event-items { display: flex; flex-direction: column; gap: 3px; max-height: 60px; overflow-y: auto;
  scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
.event-item { display: flex; align-items: center; gap: 6px; font-size: 10px; padding: 2px 8px;
  border-radius: 4px; animation: slideIn 0.3s ease-out;
  background: #fff; border: 1px solid #e2e8f0; }
@keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
.event-item .sev-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.event-item .sev-info { background: #22d3ee; }
.event-item .sev-warning { background: #fbbf24; }
.event-item .sev-critical { background: #ef4444; }
.event-item .ev-time { color: #475569; font-size: 8px; }
.event-item .ev-type { color: #64748b; font-size: 8px; }
.event-item .ev-summary { color: #475569; }

.sim-btn {
  position: fixed; right: 40px; bottom: 102px; z-index: 20;
  background: #fff; border: 1px solid #e2e8f0; color: #475569;
  padding: 4px 12px; border-radius: 4px; font-size: 9px; cursor: pointer;
  transition: all 0.2s;
}
.sim-btn:hover { background: #f1f5f9; }

.loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: #f0f4f8; z-index: 100; font-size: 14px; color: #64748b; transition: opacity 0.5s; }
.loading.hide { opacity: 0; pointer-events: none; }

.legend { position: fixed; left: 40px; bottom: 102px; z-index: 15; display: flex; gap: 16px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 9px; color: #94a3b8; }
.legend-line { width: 20px; height: 2px; }
</style>
</head>
<body>
<div class="loading" id="loading">載入即時數據中⋯</div>
<div class="bg-grid"></div>

<div class="header">
  <h1><span class="dot-live"></span> LLM-ERP <small>拓樸視圖</small></h1>
  <div class="meta">
    <span id="live-clock" style="color:#64748b">—</span>
    <span id="last-refresh" style="color:#94a3b8;font-size:11px;"></span>
    <span id="event-count" style="color:#64748b">📡 —</span>
    <a href="/war-room-en" style="color:#0891b2;font-size:11px;text-decoration:none;">🌐 EN</a>
  </div>
</div>

<div class="topology" id="topology">
  <svg viewBox="0 0 1200 520" id="topo-svg">
    <defs>
      <filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <marker id="arr-mat" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 Z" fill="#10b981"/>
      </marker>
      <marker id="arr-info" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 Z" fill="#3b82f6"/>
      </marker>
      <marker id="arr-fin" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 Z" fill="#fbbf24"/>
      </marker>
      <marker id="arr-qual" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 Z" fill="#f43f5e"/>
      </marker>
    </defs>

    <!-- ════════════════════════════ EDGES ════════════════════════════ -->
    <!-- Top Row: Planning layer -->
    <path class="topo-edge info" d="M 260,105 L 345,105" marker-end="url(#arr-info)"/>
    <path class="topo-edge info" d="M 490,105 L 555,105" marker-end="url(#arr-info)"/>
    <path class="topo-edge info" d="M 700,105 L 775,105" marker-end="url(#arr-info)"/>

    <!-- CRP → Dispatch -->
    <path class="topo-edge info" d="M 920,140 L 920,170 L 1040,170 L 1040,195" marker-end="url(#arr-info)"/>
    <text class="topo-edge-label"><textPath href="#edge-crp-sfc" startOffset="50%">派工指令</textPath></text>

    <!-- Middle row connections -->
    <path class="topo-edge quality" d="M 960,240 L 960,275 L 880,275 L 880,305" marker-end="url(#arr-qual)"/>
    <path class="topo-edge quality" d="M 720,310 L 565,310" marker-end="url(#arr-qual)"/>
    <path class="topo-edge material" d="M 400,310 L 265,310" marker-end="url(#arr-mat)"/>
    <text class="topo-edge-label"><textPath href="#edge-wms-supplier" startOffset="50%">補貨</textPath></text>

    <!-- Supplier ↔ Warehouse -->
    <path class="topo-edge material" d="M 260,285 L 395,285" marker-end="url(#arr-mat)"/>

    <!-- Finance -->
    <path class="topo-edge finance" d="M 180,180 L 415,180" marker-end="url(#arr-fin)"/>
    <path class="topo-edge finance" d="M 180,350 L 180,420 L 1040,420 L 1040,365" marker-end="url(#arr-fin)"/>

    <!-- Organization → Planning (approval flow) -->
    <path class="topo-edge info" d="M 160,140 L 160,165 L 310,165 L 310,140" marker-end="url(#arr-info)"/>
    <path class="topo-edge info" d="M 160,140 L 160,190 L 470,190 L 470,140" marker-end="url(#arr-info)"/>

    <!-- Edge path definitions for labels -->
    <path id="edge-crp-sfc" class="topo-edge info" d="M 920,140 L 920,170 L 1040,170 L 1040,195" style="stroke:none"/>
    <path id="edge-wms-supplier" class="topo-edge material" d="M 400,310 L 265,310" style="stroke:none"/>

    <!-- ════════════════════════════ NODES ════════════════════════════ -->

    <!-- Row 1: Planning & Demand (top) -->

    <!-- Node: Organization / Approval (Phase 0) -->
    <g class="topo-node" id="node-organization">
      <rect class="node-bg" x="100" y="70" width="120" height="70" rx="30" fill="#fff" stroke="#6366f1" stroke-width="2.5"/>
      <text x="160" y="94" text-anchor="middle" font-size="20">🏛️</text>
      <text x="160" y="113" text-anchor="middle" class="node-title">組織</text>
      <text x="160" y="127" text-anchor="middle" class="node-sublabel">簽核</text>
      <circle cx="210" cy="78" r="6" class="health-dot healthy"/>
    </g>

    <g class="topo-node" id="node-crm">
      <rect class="node-bg" x="250" y="70" width="120" height="70" rx="30" fill="#fff" stroke="#8b5cf6" stroke-width="2"/>
      <text x="310" y="94" text-anchor="middle" font-size="20">🤝</text>
      <text x="310" y="113" text-anchor="middle" class="node-title">CRM</text>
      <text x="310" y="127" text-anchor="middle" class="node-sublabel" id="sublabel-crm">客戶需求</text>
      <circle cx="360" cy="78" r="6" class="health-dot healthy"/>
    </g>

    <g class="topo-node" id="node-mps">
      <rect class="node-bg" x="410" y="70" width="120" height="70" rx="12" fill="#fff" stroke="#0d9488" stroke-width="2.5"/>
      <text x="470" y="92" text-anchor="middle" font-size="20">📊</text>
      <text x="470" y="111" text-anchor="middle" class="node-title">MPS</text>
      <text x="470" y="127" text-anchor="middle" class="node-kpi" id="kpi-mps">—</text>
      <circle cx="520" cy="78" r="6" class="health-dot healthy"/>
    </g>

    <g class="topo-node" id="node-mrp">
      <rect class="node-bg" x="570" y="70" width="120" height="70" rx="12" fill="#fff" stroke="#6366f1" stroke-width="2.5"/>
      <text x="630" y="92" text-anchor="middle" font-size="20">🧮</text>
      <text x="630" y="111" text-anchor="middle" class="node-title">MRP</text>
      <text x="630" y="127" text-anchor="middle" class="node-kpi" id="kpi-mrp">—</text>
      <circle cx="680" cy="78" r="6" class="health-dot healthy"/>
    </g>

    <g class="topo-node" id="node-crp">
      <rect class="node-bg" x="730" y="70" width="120" height="70" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="2.5"/>
      <text x="790" y="92" text-anchor="middle" font-size="20">⚡</text>
      <text x="790" y="111" text-anchor="middle" class="node-title">CRP/APS</text>
      <text x="790" y="127" text-anchor="middle" class="node-kpi" id="kpi-crp">—</text>
      <circle cx="840" cy="78" r="6" class="health-dot healthy"/>
    </g>

    <!-- Row 2: Execution (middle) -->

    <g class="topo-node" id="node-dispatch">
      <rect class="node-bg" x="960" y="200" width="160" height="80" rx="12" fill="#fff" stroke="#ef4444" stroke-width="2"/>
      <text x="1000" y="235" font-size="22">⚙️</text>
      <text x="1030" y="235" fill="#1e293b" font-size="15" font-weight="700">派工</text>
      <text x="1040" y="255" text-anchor="middle" class="node-kpi" id="kpi-dispatch" fill="#ef4444">—</text>
      <text x="1040" y="270" text-anchor="middle" class="node-sublabel" id="sublabel-dispatch"></text>
      <circle cx="1110" cy="208" r="6" class="health-dot healthy"/>
    </g>

    <!-- Row 3: Supply Chain (bottom) -->

    <g class="topo-node" id="node-suppliers">
      <rect class="node-bg" x="110" y="350" width="140" height="70" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="2"/>
      <text x="145" y="385" font-size="22">🏭</text>
      <text x="175" y="385" fill="#1e293b" font-size="15" font-weight="700">供應商</text>
      <text x="180" y="405" text-anchor="middle" class="node-kpi" id="kpi-suppliers" fill="#f59e0b">—</text>
      <circle cx="240" cy="358" r="6" class="health-dot healthy"/>
    </g>

    <g class="topo-node" id="node-inventory">
      <rect class="node-bg" x="360" y="350" width="160" height="80" rx="12" fill="#fff" stroke="#10b981" stroke-width="2"/>
      <text x="400" y="385" font-size="22">📦</text>
      <text x="430" y="385" fill="#1e293b" font-size="15" font-weight="700">倉儲</text>
      <text x="440" y="405" text-anchor="middle" class="node-kpi" id="kpi-inventory" fill="#10b981">—</text>
      <text x="440" y="420" text-anchor="middle" class="node-sublabel" id="sublabel-inventory"></text>
      <circle cx="510" cy="358" r="6" class="health-dot healthy"/>
    </g>

    <g class="topo-node" id="node-quality">
      <rect class="node-bg" x="620" y="350" width="160" height="80" rx="12" fill="#fff" stroke="#f43f5e" stroke-width="2"/>
      <text x="660" y="385" font-size="22">✅</text>
      <text x="690" y="385" fill="#1e293b" font-size="15" font-weight="700">品管</text>
      <text x="700" y="405" text-anchor="middle" class="node-kpi" id="kpi-quality" fill="#f43f5e">—</text>
      <text x="700" y="420" text-anchor="middle" class="node-sublabel" id="sublabel-quality"></text>
      <circle cx="770" cy="358" r="6" class="health-dot healthy"/>
    </g>

    <g class="topo-node" id="node-accounting">
      <rect class="node-bg" x="900" y="350" width="160" height="70" rx="12" fill="#fff" stroke="#fbbf24" stroke-width="2"/>
      <text x="940" y="383" font-size="22">💰</text>
      <text x="970" y="383" fill="#1e293b" font-size="15" font-weight="700">財務</text>
      <text x="980" y="403" text-anchor="middle" class="node-kpi" id="kpi-accounting" fill="#fbbf24">—</text>
      <circle cx="1050" cy="358" r="6" class="health-dot healthy"/>
    </g>

    <!-- Zone labels -->
    <text x="160" y="55" text-anchor="middle" fill="#6366f1" font-size="9" font-weight="600" opacity="0.5">組織</text>
    <text x="310" y="55" text-anchor="middle" fill="#8b5cf6" font-size="9" font-weight="600" opacity="0.5">需求端</text>
    <text x="470" y="55" text-anchor="middle" fill="#0d9488" font-size="9" font-weight="600" opacity="0.5">規劃層</text>
    <text x="790" y="55" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600" opacity="0.5">排程層</text>
    <text x="1080" y="185" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600" opacity="0.5">執行層</text>
    <text x="220" y="340" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" opacity="0.5">供應鏈</text>
    <text x="700" y="340" text-anchor="middle" fill="#f43f5e" font-size="9" font-weight="600" opacity="0.5">品保</text>
    <text x="980" y="340" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600" opacity="0.5">財務</text>

    <!-- Animated edge particles -->
    <circle r="3" class="edge-dot material-dot">
      <animateMotion dur="4s" repeatCount="indefinite" path="M 260,105 L 345,105"/>
    </circle>
    <circle r="3" class="edge-dot info-dot">
      <animateMotion dur="4s" repeatCount="indefinite" begin="1s" path="M 490,105 L 555,105"/>
    </circle>
    <circle r="3" class="edge-dot material-dot">
      <animateMotion dur="5s" repeatCount="indefinite" begin="0.5s" path="M 260,285 L 395,285"/>
    </circle>
  </svg>
  <div id="event-layer" style="position:absolute;inset:0;pointer-events:none;z-index:5;"></div>
</div>

<!-- Legend -->
<div class="legend">
  <span class="legend-item"><span class="legend-line" style="background:#10b981"></span> 料物流</span>
  <span class="legend-item"><span class="legend-line" style="background:#3b82f6"></span> 資訊流</span>
  <span class="legend-item"><span class="legend-line" style="background:#fbbf24"></span> 金流</span>
  <span class="legend-item"><span class="legend-line" style="background:#f43f5e"></span> 品質流</span>
  <span class="legend-item"><span class="health-dot healthy" style="width:8px;height:8px"></span> 正常</span>
  <span class="legend-item"><span class="health-dot warning" style="width:8px;height:8px"></span> 警告</span>
  <span class="legend-item"><span class="health-dot critical" style="width:8px;height:8px"></span> 異常</span>
</div>

<div class="event-stream">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div class="label">📡 事件流 (即時)</div>
    <div style="display:flex;gap:8px;">
      <span style="font-size:9px;color:#64748b;">🟢料物流</span>
      <span style="font-size:9px;color:#64748b;">🔵資訊流</span>
      <span style="font-size:9px;color:#64748b;">🟡金流</span>
      <span style="font-size:9px;color:#64748b;">🩷品質流</span>
    </div>
    <button class="sim-btn" onclick="simulateRandomEvent()">▶ 模擬事件</button>
  </div>
  <div class="event-items" id="event-items"></div>
</div>

<script>
// ─── Topology Node Coordinates ───
const NODE_COORDS = {
  'node-organization': { cx:160, cy:105 },
  'node-crm':         { cx:310, cy:105 },
  'node-mps':         { cx:470, cy:105 },
  'node-mrp':         { cx:630, cy:105 },
  'node-crp':         { cx:790, cy:105 },
  'node-dispatch':    { cx:1040, cy:240 },
  'node-suppliers':   { cx:180, cy:385 },
  'node-inventory':   { cx:440, cy:390 },
  'node-quality':     { cx:700, cy:390 },
  'node-accounting':  { cx:980, cy:385 },
};

// ─── Status color mapping ───
const STATUS_DOT_CLASS = { 'healthy':'healthy', 'warning':'warning', 'critical':'critical' };

// ─── Update nodes from unified summary API ───
async function fetchSummary() {
  try {
    const res = await fetch('/api/war-room/summary');
    if (!res.ok) return;
    const data = await res.json();
    const nodes = data.nodes;
    if (!nodes) return;

    Object.entries(nodes).forEach(([key, nd]) => {
      const id = 'node-' + key;
      const kpiEl = document.getElementById('kpi-' + key);
      if (kpiEl) kpiEl.textContent = nd.kpi;

      const subEl = document.getElementById('sublabel-' + key);
      if (subEl && nd.detail) subEl.textContent = nd.detail;

      const dot = document.querySelector('#' + id + ' .health-dot');
      if (dot) {
        dot.setAttribute('class', 'health-dot ' + (STATUS_DOT_CLASS[nd.status] || 'healthy'));
      }
    });

    document.getElementById('last-refresh').textContent = '更新 ' + new Date().toLocaleTimeString('zh-TW');
  } catch(e) { console.error('Summary fetch error:', e); }
  document.getElementById('loading').classList.add('hide');
}

// ─── Event → Edge mapping ───
const EVENT_EDGE_MAP = {
  'so.created':              { from:'node-crm', to:'node-mps', cls:'pur', icon:'🤝' },
  'forecast.submitted':      { from:'node-crm', to:'node-mps', cls:'pur', icon:'📊' },
  'mps.calculated':          { from:'node-mps', to:'node-mrp', cls:'pur', icon:'📊' },
  'mrp.calculated':          { from:'node-mrp', to:'node-crp', cls:'pur', icon:'🧮' },
  'work_order.created':      { from:'node-crp', to:'node-dispatch', cls:'pur', icon:'⚙️' },
  'work_order.released':     { from:'node-crp', to:'node-dispatch', cls:'prod', icon:'⚙️' },
  'material.issued':         { from:'node-inventory', to:'node-dispatch', cls:'mat', icon:'📦' },
  'work_order.completed':    { from:'node-dispatch', to:'node-quality', cls:'qual', icon:'✅' },
  'non_conformance.created': { from:'node-dispatch', to:'node-quality', cls:'qual', icon:'⚠️' },
  'nc.resolved':             { from:'node-quality', to:'node-inventory', cls:'qual', icon:'✅' },
  'purchase_order.created':  { from:'node-inventory', to:'node-suppliers', cls:'pur', icon:'📋' },
  'material.received':       { from:'node-suppliers', to:'node-inventory', cls:'mat', icon:'📦' },
  'payment.due':             { from:'node-dispatch', to:'node-accounting', cls:'fin', icon:'💰' },
  'payment.received':        { from:'node-accounting', to:'node-crm', cls:'fin', icon:'💰' },
};

// ─── Animate event flow ───
function animateEventFlow(ev) {
  const edge = EVENT_EDGE_MAP[ev.event_type] || EVENT_EDGE_MAP['material.received'];
  if (!edge) return;

  const from = NODE_COORDS[edge.from];
  const to = NODE_COORDS[edge.to];
  if (!from || !to) return;

  const layer = document.getElementById('event-layer');
  const topoEl = document.querySelector('.topology');
  const topoRect = topoEl.getBoundingClientRect();

  const svgW = 1200, svgH = 520;
  const scaleX = topoRect.width / svgW;
  const scaleY = topoRect.height / svgH;

  const sx = topoRect.left + from.cx * scaleX;
  const sy = topoRect.top + from.cy * scaleY;
  const ex = topoRect.left + to.cx * scaleX;
  const ey = topoRect.top + to.cy * scaleY;

  const label = ev.summary || `${edge.icon} ${ev.event_type.split('.').pop()}`;

  const card = document.createElement('div');
  card.className = `event-card ${edge.cls}`;
  card.textContent = label.length > 36 ? label.slice(0, 36) + '…' : label;
  card.style.left = sx + 'px';
  card.style.top = sy + 'px';
  card.style.opacity = '0';
  layer.appendChild(card);

  requestAnimationFrame(() => {
    card.style.transition = 'opacity 0.3s';
    card.style.opacity = '1';
  });

  const srcEl = document.getElementById(edge.from);
  const tgtEl = document.getElementById(edge.to);
  if (srcEl) srcEl.classList.add('highlight');
  if (tgtEl) tgtEl.classList.add('highlight');

  const dist = Math.sqrt((ex - sx) ** 2 + (ey - sy) ** 2);
  const duration = Math.min(3000, Math.max(1500, dist * 0.4));

  setTimeout(() => {
    card.style.transition = `left ${duration}ms ease-in-out, top ${duration}ms ease-in-out`;
    card.style.left = ex + 'px';
    card.style.top = ey + 'px';
  }, 400);

  setTimeout(() => {
    card.style.transition = 'opacity 0.5s';
    card.style.opacity = '0';
  }, 600 + duration);

  setTimeout(() => {
    if (srcEl) srcEl.classList.remove('highlight');
    if (tgtEl) tgtEl.classList.remove('highlight');
    card.remove();
  }, 1500 + duration);
}

// ─── Add event to stream ───
function addEventToStream(ev) {
  const container = document.getElementById('event-items');
  const sevClass = ev.severity === 'critical' ? 'sev-critical' : ev.severity === 'warning' ? 'sev-warning' : 'sev-info';
  const time = ev.timestamp ? new Date(ev.timestamp).toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit',second:'2-digit'}) : new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  const item = document.createElement('div');
  item.className = 'event-item';
  item.innerHTML = `<span class="sev-dot ${sevClass}"></span>
    <span class="ev-time">${time}</span>
    <span class="ev-type">${ev.event_type}</span>
    <span class="ev-summary">${ev.summary || ''}</span>`;
  container.prepend(item);
  while (container.children.length > 30) container.removeChild(container.lastChild);
}

// ─── Simulate random event ───
async function simulateRandomEvent() {
  const types = ['material.received','material.issued','purchase_order.created',
    'work_order.released','non_conformance.created','mps.calculated','payment.received'];
  const type = types[Math.floor(Math.random() * types.length)];
  try {
    const res = await fetch('/api/events/simulate/' + type, { method: 'POST' });
    if (res.ok) {
      const data = await res.json();
      console.log('Simulated:', data);
      refreshEvents();
    }
  } catch(e) { console.error('Sim error:', e); }
}

// ─── Refresh events ───
let lastEventCount = 0;
async function refreshEvents() {
  try {
    const res = await fetch('/api/events/activity?limit=20');
    if (!res.ok) return;
    const data = await res.json();
    const events = data.events || [];
    document.getElementById('event-count').textContent = `📡 ${events.length} 事件`;

    if (events.length > lastEventCount) {
      const newEvents = events.slice(0, events.length - lastEventCount);
      newEvents.forEach(ev => {
        addEventToStream(ev);
        animateEventFlow(ev);
      });
    } else if (events.length > 0) {
      const recent = events.slice(0, 2);
      recent.forEach(ev => {
        addEventToStream(ev);
        animateEventFlow(ev);
      });
    }
    lastEventCount = events.length;

    if (events.length === 0) {
      setTimeout(() => simulateRandomEvent(), 2000);
    }
  } catch(e) { console.error('Events fetch error:', e); }
}

// ─── Node interaction: dim others on click ───
document.querySelectorAll('.topo-node').forEach(node => {
  node.addEventListener('click', () => {
    const isDim = node.classList.contains('dim');
    document.querySelectorAll('.topo-node').forEach(n => n.classList.remove('highlight','dim'));
    if (!isDim) {
      node.classList.add('highlight');
      document.querySelectorAll('.topo-node').forEach(n => {
        if (n !== node) n.classList.add('dim');
      });
    }
  });
});

// ─── Clock ───
function updateClock() {
  document.getElementById('live-clock').textContent = new Date().toLocaleString('zh-TW', {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit'
  });
}

// ─── Init ───
fetchSummary();
updateClock();
setInterval(updateClock, 1000);
refreshEvents();
setInterval(fetchSummary, 5000);
setInterval(refreshEvents, 5000);
</script>
